kind = "mobile"
previewPath = "/"
title = "Assignment Guy"
version = "1.0.0"
id = "artifacts/assignment-guy"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25418

[services.development]
run = "pnpm --filter @workspace/assignment-guy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assignment-guy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/assignment-guy", "run", "serve" ]

[services.env]
PORT = "25418"
BASE_PATH = "/"
